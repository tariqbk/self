services:

  smtp-relay:
    container_name: smtp-relay
    image: boky/postfix
    networks:
      - tunnel_net
    ports:
      # Bind to localhost only — tunnel_net containers use smtp-relay:25,
      # host-networked containers (e.g. Home Assistant) use 127.0.0.1:25.
      - "127.0.0.1:25:25"
    environment:
      RELAYHOST: "[smtp.resend.com]:587"
      RELAYHOST_USERNAME: "resend"
      RELAYHOST_PASSWORD: "${SMTP_PASSWORD}"
      ALLOWED_SENDER_DOMAINS: "tariqbk.com"
      HOSTNAME: "smtp-relay.tariqbk.com"
    restart: unless-stopped

  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:latest
    networks:
      - tunnel_net
    ports:
      - "8080:80"
    environment:
      TZ: "America/Chicago"
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "false"
      SMTP_HOST: "smtp-relay"
      SMTP_PORT: "25"
      SMTP_SECURITY: "off"
      SMTP_FROM: "${SMTP_FROM}"
      SMTP_FROM_NAME: "Vaultwarden"
    volumes:
      - vaultwarden_data:/data
    depends_on:
      - smtp-relay
    restart: unless-stopped

  linkding:
    container_name: linkding
    image: sissbruecker/linkding:latest
    networks:
      - tunnel_net
    ports:
      - "9090:9090"
    environment:
      TZ: "America/Chicago"
      LD_SUPERUSER_NAME: "${LINKDING_SUPERUSER}"
      LD_SUPERUSER_PASSWORD: "${LINKDING_PASSWORD}"
    volumes:
      - linkding_data:/etc/linkding/data
    restart: unless-stopped

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    networks:
      - tunnel_net
    ports:
      - "2283:2283"
    environment:
      TZ: "America/Chicago"
      DB_HOSTNAME: immich-postgres
      DB_USERNAME: "${IMMICH_DB_USER}"
      DB_PASSWORD: "${IMMICH_DB_PASSWORD}"
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
    volumes:
      - ${IMMICH_PHOTOS_PATH}:/usr/src/app/upload
    depends_on:
      - immich-redis
      - immich-postgres
    restart: unless-stopped

  immich-machine-learning:
    container_name: immich_ml
    image: ghcr.io/immich-app/immich-machine-learning:release
    networks:
      - tunnel_net
    environment:
      TZ: "America/Chicago"
    volumes:
      - immich_model_cache:/cache
    restart: unless-stopped

  immich-redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9-alpine
    networks:
      - tunnel_net
    restart: unless-stopped

  immich-postgres:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    networks:
      - tunnel_net
    environment:
      POSTGRES_USER: "${IMMICH_DB_USER}"
      POSTGRES_PASSWORD: "${IMMICH_DB_PASSWORD}"
      POSTGRES_DB: immich
    volumes:
      - immich_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:latest
    networks:
      - tunnel_net
    ports:
      - "8096:8096"
    environment:
      TZ: "America/Chicago"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ${JELLYFIN_MEDIA_PATH}:/media
    # Pi 5's GPU (V3D) can offload some encode/decode work via /dev/dri,
    # though hardware transcoding support is limited compared to Pi 4.
    # For the biggest CPU savings, keep media in formats clients can
    # Direct Play (H.264/AAC in MP4) so Jellyfin doesn't transcode at all.
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  caddy:
    container_name: caddy
    build:
      context: ./caddy
    networks:
      - tunnel_net
    ports:
      - "443:443"
    environment:
      CLOUDFLARE_DNS_API_TOKEN: "${CLOUDFLARE_DNS_API_TOKEN}"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    networks:
      - tunnel_net
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    restart: unless-stopped
    depends_on:
      - vaultwarden
      - immich-server
      - linkding
      - jellyfin

networks:
  tunnel_net:
    driver: bridge
    name: tunnel_net

volumes:
  vaultwarden_data:
  linkding_data:
  immich_model_cache:
  immich_postgres_data:
  jellyfin_config:
  jellyfin_cache:
  caddy_data:
  caddy_config:
