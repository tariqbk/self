services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    network_mode: bridge
    ports:
      - "9443:9443"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

volumes:
  portainer_data:
