services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    network_mode: bridge
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"
    environment:
      TZ: "America/Chicago"
      FTLCONF_webserver_api_password: "${PIHOLE_PASSWORD}"
      FTLCONF_dns_upstreams: "1.1.1.1;1.0.0.1"
      FTLCONF_dns_dnssec: "true"
      # Default "local" mode only answers queries from the docker bridge
      # subnet. Devices on the LAN connect via DNAT (source IP is their real
      # LAN IP), so FTL must listen on "all" to respond to them.
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_dns_hosts: "${PI_LOCAL_IP} pihole.home;${PI_LOCAL_IP} portainer.home;${PI_LOCAL_IP} ha.home;${PI_LOCAL_IP} glances.home;${PI_LOCAL_IP} vault.tariqbk.com;${PI_LOCAL_IP} immich.tariqbk.com;${PI_LOCAL_IP} links.tariqbk.com;${PI_LOCAL_IP} jellyfin.tariqbk.com"
    volumes:
      - './etc-pihole:/etc/pihole'
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
