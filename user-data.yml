#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE FILE — do not use directly.
# Run ./build-user-data.sh to produce the final user-data file for flashing.
# All ${VARIABLE} tokens are replaced by values from secrets.env.
# ─────────────────────────────────────────────────────────────────────────────

# ── Output ────────────────────────────────────────────────────────────────────
# Mirror all cloud-init output to the console (visible on attached monitor)
# as well as the default log file /var/log/cloud-init-output.log
output:
  all: '| tee -a /var/log/cloud-init-output.log /dev/console'

# ── System ────────────────────────────────────────────────────────────────────
hostname: pi5
manage_etc_hosts: true
packages:
  - avahi-daemon
  - curl
  - git

# ── Packages ──────────────────────────────────────────────────────────────────
apt:
  conf: |
    Acquire {
      Check-Date "false";
    };
timezone: America/Chicago
keyboard:
  model: pc105
  layout: "us"
enable_ssh: true
# ── User ──────────────────────────────────────────────────────────────────────
users:
  - name: tariqbk
    groups: users,adm,dialout,audio,netdev,video,plugdev,cdrom,games,input,gpio,spi,i2c,render,sudo,docker
    shell: /bin/bash
    lock_passwd: false
    passwd: ${USER_PASSWORD_HASH}

ssh_pwauth: true

package_update: true
package_upgrade: false

# ── Bootcmd ───────────────────────────────────────────────────────────────────
# Runs during cloud-init's early "init" stage — BEFORE package_update/upgrade
# and the `packages` list are processed (those run in the "config" stage).
# Pi has no RTC, so the clock is wrong on first boot, causing apt signature
# verification to fail ("not live until ..."). Sync time here so it's correct
# before any apt operations happen.
#
# systemctl/timedatectl require D-Bus, which isn't up yet at this stage, so
# fetch the current time from an HTTP server's Date header instead. Plain
# HTTP (not HTTPS) avoids TLS cert validation failing due to the wrong clock.
bootcmd:
  - echo "==> Waiting for time synchronization..."
  - |
    for i in $(seq 1 30); do
      DATE=$(curl -sI --max-time 5 http://google.com | grep -i '^Date:' | cut -d' ' -f2- | tr -d '\r')
      if [ -n "$DATE" ]; then
        date -s "$DATE"
        break
      fi
      sleep 2
    done
  - echo "==> Time synchronized."

# ── Bootstrap ─────────────────────────────────────────────────────────────────
runcmd:
  # Install Docker (official convenience script — installs engine + compose plugin)
  - echo "==> Installing Docker..."
  - curl -fsSL https://get.docker.com | sh
  - echo "==> Docker installed."

  # Clone repo
  - echo "==> Cloning repo..."
  - git clone ${REPO_URL} /home/tariqbk/docker
  - chown -R tariqbk:tariqbk /home/tariqbk/docker
  - echo "==> Repo cloned."

  # Phase 1: Portainer
  - echo "==> Starting Portainer..."
  - docker compose -f /home/tariqbk/docker/portainer/docker-compose.yml up -d
  - echo "==> Portainer started."

  # Phase 2: Pi-hole
  - echo "==> Configuring Pi-hole..."
  - mkdir -p /home/tariqbk/docker/pihole/etc-pihole
  - |
    cat > /home/tariqbk/docker/pihole/.env << 'EOF'
    PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
    PI_LOCAL_IP=${PI_LOCAL_IP}
    EOF
  - chown -R tariqbk:tariqbk /home/tariqbk/docker/pihole
  - echo "==> Starting Pi-hole..."
  - docker compose -f /home/tariqbk/docker/pihole/docker-compose.yml up -d
  - echo "==> Pi-hole started."

  # Phase 3: Home Assistant
  - echo "==> Starting Home Assistant..."
  - mkdir -p /home/tariqbk/docker/homeassistant/config
  - chown -R tariqbk:tariqbk /home/tariqbk/docker/homeassistant
  - docker compose -f /home/tariqbk/docker/homeassistant/docker-compose.yml up -d
  - echo "==> Home Assistant started."

  # ── Cleanup ───────────────────────────────────────────────────────────────
  # Remove user-data and network-config from the boot partition so secrets
  # (passwords, wifi credentials) don't persist on the card
  - echo "Setup complete. Cleaning up boot partition..."
  - rm -f /boot/firmware/user-data /boot/firmware/network-config
  - echo "Done."

rpi:
  interfaces:
    serial: true
