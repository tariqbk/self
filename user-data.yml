#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE FILE — do not use directly.
# Run ./build-user-data.sh to produce the final user-data file for flashing.
# All ${VARIABLE} tokens are replaced by values from secrets.env.
# ─────────────────────────────────────────────────────────────────────────────

# ── Output ────────────────────────────────────────────────────────────────────
# Mirror all cloud-init output to the console (visible on attached monitor)
# as well as the default log file /var/log/cloud-init-output.log
output:
  all: '| tee -a /var/log/cloud-init-output.log /dev/console'

# ── System ────────────────────────────────────────────────────────────────────
hostname: pi5
manage_etc_hosts: true
packages:
  - avahi-daemon
  - curl
  - git

# ── Apt ───────────────────────────────────────────────────────────────────────
# The `packages` list above installs during cloud-init's "config" stage, which
# runs before `runcmd` (where we sync the clock). Disable apt's signature
# date check so this early install doesn't fail due to the wrong clock.
apt:
  conf: |
    Acquire {
      Check-Date "false";
    };
timezone: America/Chicago
keyboard:
  model: pc105
  layout: "us"
enable_ssh: true
# ── User ──────────────────────────────────────────────────────────────────────
users:
  - name: tariqbk
    groups: users,adm,dialout,audio,netdev,video,plugdev,cdrom,games,input,gpio,spi,i2c,render,sudo,docker
    shell: /bin/bash
    lock_passwd: false
    passwd: ${USER_PASSWORD_HASH}

ssh_pwauth: true

# ── Bootstrap ─────────────────────────────────────────────────────────────────
runcmd:
  # Pi has no RTC, so the clock is wrong on first boot, causing apt/sqv
  # signature verification failures. Sync time before any apt operations.
  # D-Bus is available at this stage, so systemctl/timedatectl work here
  # (unlike in bootcmd's earlier "init" stage).
  - echo "==> Waiting for time synchronization..."
  - systemctl start systemd-timesyncd
  - timedatectl set-ntp true
  - |
    for i in $(seq 1 30); do
      if [ "$(timedatectl show -p NTPSynchronized --value)" = "yes" ]; then
        break
      fi
      sleep 2
    done
  - echo "==> Time synchronized."

  # Install Docker (official convenience script — installs engine + compose plugin)
  - echo "==> Installing Docker..."
  - curl -fsSL https://get.docker.com | sh
  - echo "==> Docker installed."

  # Clone repo
  - echo "==> Cloning repo..."
  - git clone ${REPO_URL} /home/tariqbk/docker
  - chown -R tariqbk:tariqbk /home/tariqbk/docker
  - echo "==> Repo cloned."

  # Copy secrets onto the Pi's disk so setup.sh can read them — both now and
  # on any future manual reruns (recovery without re-flashing)
  - echo "==> Copying secrets..."
  - cp /boot/firmware/secrets.env /home/tariqbk/docker/secrets.env
  - chown tariqbk:tariqbk /home/tariqbk/docker/secrets.env
  - chmod 600 /home/tariqbk/docker/secrets.env
  - echo "==> Secrets copied."

  # Run the full stack setup (Portainer, Pi-hole, Home Assistant, Glances,
  # tunnel stack — see setup.sh)
  - echo "==> Running setup.sh..."
  - bash /home/tariqbk/docker/setup.sh
  - echo "==> setup.sh complete."

  # ── Cleanup ───────────────────────────────────────────────────────────────
  # Remove user-data, network-config, and secrets.env from the boot partition
  # so secrets (passwords, wifi credentials, tokens) don't persist on the card
  - echo "Setup complete. Cleaning up boot partition..."
  - rm -f /boot/firmware/user-data /boot/firmware/network-config /boot/firmware/secrets.env
  - echo "Done."

rpi:
  interfaces:
    serial: true
