#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE FILE — do not use directly.
# Run ./build-user-data.sh to produce the final user-data file for flashing.
# All ${VARIABLE} tokens are replaced by values from secrets.env.
# ─────────────────────────────────────────────────────────────────────────────

# ── Output ────────────────────────────────────────────────────────────────────
# Mirror all cloud-init output to the console (visible on attached monitor)
# as well as the default log file /var/log/cloud-init-output.log
output:
  all: '| tee -a /var/log/cloud-init-output.log /dev/console'

# ── System ────────────────────────────────────────────────────────────────────
hostname: pi5
manage_etc_hosts: true
packages:
  - avahi-daemon
  - curl
  - git

# ── Packages ──────────────────────────────────────────────────────────────────
apt:
  conf: |
    Acquire {
      Check-Date "false";
    };
timezone: America/Chicago
keyboard:
  model: pc105
  layout: "us"
enable_ssh: true
# ── User ──────────────────────────────────────────────────────────────────────
users:
  - name: tariqbk
    groups: users,adm,dialout,audio,netdev,video,plugdev,cdrom,games,input,gpio,spi,i2c,render,sudo,docker
    shell: /bin/bash
    lock_passwd: false
    passwd: ${USER_PASSWORD_HASH}

ssh_pwauth: true

package_update: true
package_upgrade: false

# ── Bootstrap ─────────────────────────────────────────────────────────────────
runcmd:
  # Force NTP time sync first — Pi has no RTC so clock is wrong on first boot.
  # Without this, apt signature verification fails ("not live until ...").
  # systemd-timesyncd is guaranteed present (part of systemd) — no install needed.
  - echo "==> Waiting for NTP time synchronization..."
  - systemctl start systemd-timesyncd
  - timedatectl set-ntp true
  - until timedatectl show | grep -q 'NTPSynchronized=yes'; do sleep 2; done
  - echo "==> Time synchronized."

  # Install Docker (official convenience script — installs engine + compose plugin)
  - echo "==> Installing Docker..."
  - curl -fsSL https://get.docker.com | sh
  - echo "==> Docker installed."

  # Clone repo
  - echo "==> Cloning repo..."
  - git clone ${REPO_URL} /home/tariqbk/docker
  - chown -R tariqbk:tariqbk /home/tariqbk/docker
  - echo "==> Repo cloned."

  # Phase 1: Portainer
  - echo "==> Starting Portainer..."
  - docker compose -f /home/tariqbk/docker/portainer/docker-compose.yml up -d
  - echo "==> Portainer started."

  # Phase 2: Pi-hole
  - echo "==> Configuring Pi-hole..."
  - mkdir -p /home/tariqbk/docker/pihole/etc-pihole
  - |
    cat > /home/tariqbk/docker/pihole/.env << 'EOF'
    PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
    EOF
  - |
    cat > /home/tariqbk/docker/pihole/etc-pihole/custom.list << 'EOF'
    ${PI_LOCAL_IP} pihole.home
    ${PI_LOCAL_IP} portainer.home
    ${PI_LOCAL_IP} vault.home
    ${PI_LOCAL_IP} photos.home
    ${PI_LOCAL_IP} links.home
    ${PI_LOCAL_IP} ha.home
    ${PI_LOCAL_IP} glances.home
    EOF
  - chown -R tariqbk:tariqbk /home/tariqbk/docker/pihole
  - echo "==> Starting Pi-hole..."
  - docker compose -f /home/tariqbk/docker/pihole/docker-compose.yml up -d
  - echo "==> Pi-hole started."

  # ── Cleanup ───────────────────────────────────────────────────────────────
  # Remove user-data from the boot partition so secrets don't persist on card
  - echo "Setup complete. Cleaning up user-data..."
  - rm -f /boot/firmware/user-data
  - echo "Done."

rpi:
  interfaces:
    serial: true
